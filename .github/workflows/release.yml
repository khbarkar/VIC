name: release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    if: ${{ !startsWith(github.event.head_commit.message, 'Release v') && !contains(github.event.head_commit.message, '[no release]') }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decide bump level
        id: bump
        shell: bash
        run: |
          message="${{ github.event.head_commit.message }}"
          if [[ "$message" == *"BREAKING CHANGE"* ]] || [[ "$message" == *"!:"* ]]; then
            echo "level=major" >> "$GITHUB_OUTPUT"
          elif [[ "$message" == feat:* ]]; then
            echo "level=minor" >> "$GITHUB_OUTPUT"
          else
            echo "level=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version
        run: ./scripts/bump_version.sh VERSION "${{ steps.bump.outputs.level }}"

      - name: Read version
        id: version
        shell: bash
        run: echo "value=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Commit version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "Release v${{ steps.version.outputs.value }}"
          git push origin HEAD:main

      - name: Create tag
        run: |
          git tag "v${{ steps.version.outputs.value }}"
          git push origin "v${{ steps.version.outputs.value }}"
